<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Flexible Zip Uploader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
        }
        .glass-card {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(48, 54, 61, 0.8);
        }
        .select-wrapper {
            position: relative;
        }
        .select-arrow {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%) rotate(0deg);
            transition: transform 0.2s ease;
            pointer-events: none;
        }
        .select-wrapper.active .select-arrow {
            transform: translateY(-50%) rotate(180deg);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-lg rounded-2xl p-6 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-white flex items-center justify-center gap-2">
            <svg class="w-7 h-7 text-white" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            GitHub Zip Uploader
        </h2>

        <form id="uploadForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">GitHub Username</label>
                <input type="text" id="username" required placeholder="เช่น Octocat"
                    class="w-full px-4 py-2 rounded-lg bg-[#21262d] border border-[#30363d] focus:border-blue-500 focus:outline-none text-white">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">GitHub Token (Classic or Fine-Grained)</label>
                <input type="password" id="token" required placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
                    class="w-full px-4 py-2 rounded-lg bg-[#21262d] border border-[#30363d] focus:border-blue-500 focus:outline-none text-white">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">Select or Create Repository</label>
                <div class="flex gap-2 w-full">
                    <div class="select-wrapper flex-1" id="repoSelectWrapper">
                        <select id="repoSelect" onchange="toggleRepoInput()" onfocus="this.parentElement.classList.add('active')" onblur="this.parentElement.classList.remove('active')" class="w-full px-4 py-2 rounded-lg bg-[#21262d] border border-[#30363d] focus:border-blue-500 focus:outline-none text-white appearance-none cursor-pointer">
                            <option value="__NEW__">&lt; สร้าง Repository ใหม่ &gt;</option>
                        </select>
                        <svg class="select-arrow w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>

            <div id="newRepoInputBox">
                <label class="block text-sm font-medium mb-1 text-gray-400">Repository Name</label>
                <input type="text" id="repo" placeholder="เช่น my-awesome-project"
                    class="w-full px-4 py-2 rounded-lg bg-[#21262d] border border-[#30363d] focus:border-blue-500 focus:outline-none text-white">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">Branch</label>
                <div class="select-wrapper" id="branchSelectWrapper">
                    <select id="branch" onfocus="this.parentElement.classList.add('active')" onblur="this.parentElement.classList.remove('active')" class="w-full px-4 py-2 rounded-lg bg-[#21262d] border border-[#30363d] focus:border-blue-500 focus:outline-none text-white appearance-none cursor-pointer">
                        <option value="main" selected>main</option>
                        <option value="master">master</option>
                    </select>
                    <svg class="select-arrow w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>

            <input type="file" id="zipFile" accept=".zip" class="hidden">

            <div id="fileInfoBox" class="hidden p-3 rounded-lg bg-[#161b22] border border-[#30363d] text-sm text-gray-300">
                <div class="flex items-center gap-2 mb-1 text-emerald-400 font-semibold">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    ข้อมูลไฟล์ที่จะส่งขึ้น Repo:
                </div>
                <div class="font-mono text-xs space-y-0.5 pl-6">
                    <div>ชื่อไฟล์ปลายทาง: <span id="infoName" class="text-amber-400 font-bold"></span></div>
                    <div>ขนาดจริง: <span id="infoSize" class="text-white"></span></div>
                    <div class="text-blue-400 mt-1 flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        ติดตั้งระบบรองรับ ZIP ทุกรูปแบบ (.yml)
                    </div>
                </div>
            </div>

            <button type="button" id="submitBtn" onclick="document.getElementById('zipFile').click()"
                class="w-full mt-6 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 shadow-md">
                เลือกไฟล์ .zip เพื่อเริ่มอัปโหลด
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const zipFileInput = document.getElementById('zipFile');
        const fileInfoBox = document.getElementById('fileInfoBox');
        const infoName = document.getElementById('infoName');
        const infoSize = document.getElementById('infoSize');
        const repoSelect = document.getElementById('repoSelect');
        const newRepoInputBox = document.getElementById('newRepoInputBox');

        // ตัว Workflow YAML แบบปรับปรุงใหม่ให้ดักจับและขยายไฟล์นามสกุล .zip ใดๆ ก็ตามที่อัปเข้ามา
        const workflowYamlContent = `name: Auto Unzip Any Archive

on:
  push:
    paths:
      - '**.zip' # ตรวจจับไฟล์ .zip ทุกชื่อใน Repository

permissions:
  contents: write

jobs:
  unzip-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract all zip files to Root
        run: |
          # ค้นหาไฟล์ .zip ทั้งหมดในโฟลเดอร์หลักแล้วสั่งแตกไฟล์ออกมาไว้หน้าแรก
          for f in *.zip; do
            [ -e "$f" ] || continue
            echo "กำลังจัดการแตกไฟล์: $f"
            unzip -o "$f" -d ./
            rm "$f"
          done

      - name: Check Strip Folder Logic
        run: |
          if [ \$(ls -1q | wc -l) -eq 1 ] && [ -d */ ]; then
             echo "พบโฟลเดอร์ซ้อนชั้นนอก.. กำลังขยับดึงไฟล์ออกมาไว้หน้าแรกให้"
             mv */* ./ 2>/dev/null || true
             rm -rf */
          fi

      - name: Commit and Push Changes back to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Unpack user zip contents and clean archive via Dynamic Automation Workflow"
            git push
          else
            echo "ไม่มีการเปลี่ยนแปลงโครงสร้างไฟล์เพิ่มเติม"
          fi
`;

        document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('token').focus(); } });
        document.getElementById('token').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); if (repoSelect.value === '__NEW__') document.getElementById('repo').focus(); else document.getElementById('repoSelect').focus(); } });
        document.getElementById('repo').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('branch').focus(); } });

        function toggleRepoInput() {
            document.getElementById('repoSelectWrapper').classList.remove('active');
            if (repoSelect.value === '__NEW__') {
                newRepoInputBox.classList.remove('hidden');
                document.getElementById('repo').required = true;
            } else {
                newRepoInputBox.classList.add('hidden');
                document.getElementById('repo').required = false;
                document.getElementById('repo').value = repoSelect.value;
            }
        }

        async function fetchRepositories() {
            const username = document.getElementById('username').value.trim();
            const token = document.getElementById('token').value.trim();
            if (!username || !token) return;

            try {
                const res = await fetch(`https://api.github.com/user/repos?per_page=100&sort=updated`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (res.ok) {
                    const repos = await res.json();
                    repoSelect.innerHTML = '<option value="__NEW__">&lt; สร้าง Repository ใหม่ &gt;</option>';
                    const savedRepo = localStorage.getItem('gh_repo');
                    let foundSaved = false;

                    repos.forEach(repoData => {
                        const option = document.createElement('option');
                        option.value = repoData.name;
                        option.text = repoData.name;
                        if (repoData.name === savedRepo) { option.selected = true; foundSaved = true; }
                        repoSelect.appendChild(option);
                    });
                    toggleRepoInput();
                }
            } catch (err) { console.error(err); }
        }

        document.getElementById('username').addEventListener('change', fetchRepositories);
        document.getElementById('token').addEventListener('change', fetchRepositories);

        window.addEventListener('DOMContentLoaded', async () => {
            if (localStorage.getItem('gh_username')) document.getElementById('username').value = localStorage.getItem('gh_username');
            if (localStorage.getItem('gh_token')) document.getElementById('token').value = localStorage.getItem('gh_token');
            if (localStorage.getItem('gh_branch')) document.getElementById('branch').value = localStorage.getItem('gh_branch');
            await fetchRepositories();
            if (repoSelect.value === '__NEW__' && localStorage.getItem('gh_repo')) document.getElementById('repo').value = localStorage.getItem('gh_repo');
        });

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024, sizes = ['Bytes', 'KB', 'MB', 'GB'], i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        zipFileInput.addEventListener('change', async () => {
            if (zipFileInput.files.length === 0) return;
            
            const username = document.getElementById('username').value.trim();
            const token = document.getElementById('token').value.trim();
            const repo = repoSelect.value === '__NEW__' ? document.getElementById('repo').value.trim() : repoSelect.value;
            const branch = document.getElementById('branch').value.trim() || 'main';
            
            if (!username || !token || !repo) {
                alert('กรุณากรอกข้อมูลและระบุ Repository ให้เรียบร้อยก่อนเลือกไฟล์ครับ');
                zipFileInput.value = '';
                return;
            }

            localStorage.setItem('gh_username', username);
            localStorage.setItem('gh_token', token);
            localStorage.setItem('gh_repo', repo);
            localStorage.setItem('gh_branch', branch);

            const file = zipFileInput.files[0];
            const fileName = file.name; // ดึงชื่อไฟล์จริงที่ผู้ใช้เลือกมาใช้งานแบบไดนามิก
            
            infoName.innerText = fileName;
            infoSize.innerText = formatBytes(file.size);
            fileInfoBox.classList.remove('hidden');

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                submitBtn.innerText = 'กำลังตรวจสอบระบบ Repository...';
                const checkRepoRes = await fetch(`https://api.github.com/repos/${username}/${repo}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if (checkRepoRes.status === 404) {
                    submitBtn.innerText = 'กำลังสร้าง Repository ใหม่...';
                    const createRepoRes = await fetch(`https://api.github.com/user/repos`, {
                        method: 'POST',
                        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: repo, private: false, auto_init: true })
                    });
                    if (!createRepoRes.ok) throw new Error('ไม่สามารถสร้าง Repo ใหม่ได้');
                    await new Promise(r => setTimeout(r, 3000));
                }

                // สแกนตรวจสอบและอัปเดตตัว Workflow .yml ให้อัตโนมัติในกรณีที่ยังไม่มีในกิ่งงาน
                submitBtn.innerText = 'กำลังตรวจสอบคิวงาน GitHub Workflow...';
                const workflowPath = '.github/workflows/unzip.yml';

                const checkWorkflowRes = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${workflowPath}?ref=${branch}`, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (checkWorkflowRes.status === 404) {
                    submitBtn.innerText = '⚙️ กำลังติดตั้งระบบแตกไฟล์อัตโนมัติ (.yml)...';
                    const b64Workflow = btoa(unescape(encodeURIComponent(workflowYamlContent)));
                    
                    const createWorkflowRes = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${workflowPath}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: 'Setup flexible generic automatic Unzip Workflow',
                            content: b64Workflow,
                            branch: branch
                        })
                    });
                    if (!createWorkflowRes.ok) console.warn('คำเตือน: อัปโหลด Workflow ขัดข้องชั่วคราว');
                }

                submitBtn.innerText = `กำลังแปลงไฟล์ ${fileName} เป็น Base64...`;
                const reader = new FileReader();
                const base64Promise = new Promise(resolve => {
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
                const base64Content = await base64Promise;

                submitBtn.innerText = `กำลังอัปโหลดไฟล์ ${fileName} ไปยัง GitHub...`;
                
                let currentSha = null;
                const fileCheckRes = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${fileName}?ref=${branch}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (fileCheckRes.ok) {
                    const fileCheckData = await fileCheckRes.json();
                    currentSha = fileCheckData.sha;
                }

                const uploadRes = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${fileName}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Upload ${fileName} via Dynamic Web Interface`,
                        content: base64Content,
                        branch: branch,
                        sha: currentSha
                    })
                });

                if (!uploadRes.ok) {
                    const errData = await uploadRes.json();
                    throw new Error(errData.message);
                }

                submitBtn.innerText = '🚀 อัปโหลดสำเร็จ! ตัวแตกไฟล์เริ่มทำงานแล้ว';
                setTimeout(() => { submitBtn.innerText = 'เลือกไฟล์ .zip เพื่อเริ่มอัปโหลด'; }, 4000);

            } catch (err) {
                alert(`เกิดข้อผิดพลาด: ${err.message}`);
                submitBtn.innerText = 'เกิดข้อผิดพลาด ลองใหม่อีกครั้ง';
                setTimeout(() => { submitBtn.innerText = 'เลือกไฟล์ .zip เพื่อเริ่มอัปโหลด'; }, 3000);
            } finally {
                zipFileInput.value = '';
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
